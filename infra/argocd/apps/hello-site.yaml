apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-site
  namespace: argocd
  # Ensures Argo CD cascade-deletes this app's Deployment/Service/Ingress when the
  # Application is removed, rather than orphaning them in the default namespace.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/richardtan10176/homelab_config.git
    targetRevision: main
    path: apps/hello-site/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
