apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgrep-demo
  namespace: default
  labels:
    app: sgrep-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sgrep-demo
  template:
    metadata:
      labels:
        app: sgrep-demo
    spec:
      containers:
        - name: sgrep-demo
          image: ghcr.io/richardtan10176/sgrep-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          # First app in this repo with resource limits/probes: it runs an ML
          # model, so it needs a real memory budget and a slow warm-up window.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          # Startup can take ~10-30s (model load + index load). startupProbe
          # holds off liveness until /healthz first succeeds; readiness keeps
          # traffic away until then.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 20
