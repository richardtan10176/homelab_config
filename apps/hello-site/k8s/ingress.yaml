apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-site
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: hello.homelab.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-site
                port:
                  number: 80
