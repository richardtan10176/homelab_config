apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-ingester
  namespace: crypto-analytics
  labels:
    app: crypto-ingester
spec:
  # Must stay at 1: the ingester binary spawns one goroutine per symbol
  # internally, so a second replica would just publish every trade twice.
  replicas: 1
  selector:
    matchLabels:
      app: crypto-ingester
  template:
    metadata:
      labels:
        app: crypto-ingester
    spec:
      containers:
        - name: ingester
          image: ghcr.io/richardtan10176/crypto-ingester:a13304296330222823627c3474d0b87946036a40
          env:
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: trades
            - name: BINANCE_WS_BASE_URL
              value: wss://stream.binance.com:9443/ws
            - name: SYMBOLS
              value: BTCUSDT,ETHUSDT,SOLUSDT
