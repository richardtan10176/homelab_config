name: Build and deploy landing

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/html/**"
      - "apps/landing/src/**"
      - "apps/landing/package.json"
      - "apps/landing/package-lock.json"
      - "apps/landing/Dockerfile"
      - ".github/workflows/build-landing.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/landing

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/landing
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Update deployment.yaml with new image tag
        run: |
          sed -i "s|image: ghcr.io/[^ ]*/landing:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" apps/landing/k8s/deployment.yaml
          cat apps/landing/k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/landing/k8s/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "landing: deploy image ${{ github.sha }}"
          git push
