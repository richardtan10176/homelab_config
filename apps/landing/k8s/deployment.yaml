apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: default
  labels:
    app: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      containers:
        - name: landing
          image: ghcr.io/richardtan10176/landing:4d25fa15f5c16d7dd56224658269ed7cfe71aef7
          ports:
            - containerPort: 80
