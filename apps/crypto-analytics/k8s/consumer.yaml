apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-consumer
  namespace: crypto-analytics
  labels:
    app: crypto-consumer
spec:
  # Must stay at 1: the consumer binary spawns one goroutine per symbol
  # internally (each with its own kafka.Reader in the "analytics" group), so
  # a second replica would just contend for the same partitions.
  replicas: 1
  selector:
    matchLabels:
      app: crypto-consumer
  template:
    metadata:
      labels:
        app: crypto-consumer
    spec:
      containers:
        - name: consumer
          image: ghcr.io/richardtan10176/crypto-consumer:a13304296330222823627c3474d0b87946036a40
          env:
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: trades
            - name: SYMBOLS
              value: BTCUSDT,ETHUSDT,SOLUSDT
            - name: TIMESCALE_DSN
              valueFrom:
                secretKeyRef:
                  name: timescale-creds
                  key: dsn
