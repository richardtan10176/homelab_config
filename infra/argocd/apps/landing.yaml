apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/richardtan10176/homelab_config.git
    targetRevision: main
    path: apps/landing/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
